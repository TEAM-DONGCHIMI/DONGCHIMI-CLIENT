  '@lhci/cli': ^0.15.1
  '@playwright/test': ^1.61.1
  '@sentry/nextjs': ^10.59.0
  '@sentry/react': ^10.59.0
  '@serwist/next': ^9.5.11
  '@tanstack/react-query': ^5.101.0
  '@tanstack/react-query-devtools': ^5.101.0
  '@hookform/resolvers': ^5.4.0
  '@turbo/gen': ^2.9.18
  '@vercel/analytics': ^2.0.1
  '@vitejs/plugin-react': ^6.0.2
  clsx: ^2.1.1
