name: Chromatic

on:
  pull_request:
    paths:
      - 'packages/design-system/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/chromatic.yml'

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish Design System Storybook
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@c93e0bc3a63aa176e14a75b61a31847cbfdd341c
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/design-system
          buildScriptName: build-storybook
          exitZeroOnChanges: true

      - name: Get current time
        id: current-time
        uses: josStorer/get-current-time@6826799222c9d913068c04cb99e67f34dbf3caae
        with:
          format: 'YYYY년 MM월 DD일 HH시 mm분 ss초'
          utcOffset: '+09:00'

      - name: Comment Storybook URL
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-tag: chromatic-preview
          message: |
            Storybook preview URL: ${{ steps.chromatic.outputs.storybookUrl }}
            Update time: ${{ steps.current-time.outputs.formattedTime }}
